<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beat Parry</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <div id="menu" class="screen active">
      <h1>Beat Parry</h1>
      <p class="subtitle">Parry the beat. Master the line.</p>
      <div id="song-list"></div>
      <div class="controls-hint">
        <span><kbd>F</kbd> <kbd>J</kbd> — 1 layer (easy)</span>
        <span><kbd>F</kbd> <kbd>G</kbd> Left · <kbd>J</kbd> <kbd>K</kbd> Right — 2 layers (medium/hard)</span>
        <span class="layer-note">Bad parries cost −150 points and break your combo</span>
      </div>
    </div>

    <div id="hud" class="hidden">
      <div class="hud-score">
        <span class="label">Score</span>
        <span id="score">0</span>
      </div>
      <div class="hud-combo">
        <span class="label">Combo</span>
        <span id="combo">0</span>
      </div>
      <div class="hud-song">
        <span id="song-name"></span>
        <div class="progress-bar"><div id="progress-fill"></div></div>
      </div>
    </div>

    <div id="results" class="screen hidden">
      <h2>Song Complete</h2>
      <div id="grade" class="grade">S</div>
      <div class="stats">
        <div><span>Score</span><strong id="final-score">0</strong></div>
        <div><span>Accuracy</span><strong id="final-accuracy">0%</strong></div>
        <div><span>Excellent</span><strong id="stat-excellent">0</strong></div>
        <div><span>Good</span><strong id="stat-good">0</strong></div>
        <div><span>Medium</span><strong id="stat-medium">0</strong></div>
        <div><span>Bad</span><strong id="stat-bad">0</strong></div>
        <div><span>Miss</span><strong id="stat-miss">0</strong></div>
        <div><span>Max Combo</span><strong id="stat-max-combo">0</strong></div>
      </div>
      <button id="back-btn" class="btn">Back to Menu</button>
    </div>

    <div id="flash-overlay"></div>
  </div>

  <script src="js/songs.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
